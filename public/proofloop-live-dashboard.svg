<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">ProofLoop Live dashboard preview</title>
  <desc id="desc">A dashboard showing live browser checks, agent harness tasks, model routes, costs, and verifier receipts.</desc>
  <rect width="1200" height="760" fill="#15191d"/>
  <rect x="36" y="34" width="1128" height="692" rx="18" fill="#fffdfa"/>
  <rect x="36" y="34" width="1128" height="74" rx="18" fill="#24323b"/>
  <text x="72" y="82" fill="#fffdfa" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="800">ProofLoop Live Run</text>
  <text x="945" y="80" fill="#f2d6a6" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">product proof</text>
  <rect x="72" y="146" width="314" height="136" rx="10" fill="#f6f1e8" stroke="#ded8ce"/>
  <text x="96" y="184" fill="#b85d3f" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">Live browser</text>
  <text x="96" y="226" fill="#15191d" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="850">12 / 12</text>
  <text x="96" y="258" fill="#5e666f" font-family="Inter, Arial, sans-serif" font-size="18">selectors, screenshots, clips</text>
  <rect x="424" y="146" width="314" height="136" rx="10" fill="#eef4f3" stroke="#cbd8d2"/>
  <text x="448" y="184" fill="#1e5b7a" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">Harness tasks</text>
  <text x="448" y="226" fill="#15191d" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="850">5416</text>
  <text x="448" y="258" fill="#5e666f" font-family="Inter, Arial, sans-serif" font-size="18">resumable plan items</text>
  <rect x="776" y="146" width="314" height="136" rx="10" fill="#f8f0df" stroke="#e3d1a8"/>
  <text x="800" y="184" fill="#55745c" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">Budget guard</text>
  <text x="800" y="226" fill="#15191d" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="850">$100</text>
  <text x="800" y="258" fill="#5e666f" font-family="Inter, Arial, sans-serif" font-size="18">free route sweep first</text>
  <rect x="72" y="330" width="496" height="336" rx="10" fill="#fffdfa" stroke="#ded8ce"/>
  <text x="96" y="372" fill="#15191d" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800">Trace waterfall</text>
  <g font-family="Inter, Arial, sans-serif" font-size="16" fill="#5e666f">
    <rect x="96" y="410" width="92" height="24" rx="4" fill="#b85d3f"/>
    <rect x="206" y="410" width="238" height="24" rx="4" fill="#e0b08e"/>
    <text x="96" y="460">open live URL</text>
    <rect x="96" y="482" width="172" height="24" rx="4" fill="#1e5b7a"/>
    <rect x="286" y="482" width="180" height="24" rx="4" fill="#9fc1cb"/>
    <text x="96" y="532">submit task prompt</text>
    <rect x="96" y="554" width="116" height="24" rx="4" fill="#55745c"/>
    <rect x="232" y="554" width="284" height="24" rx="4" fill="#adc1a9"/>
    <text x="96" y="604">verify visible result</text>
  </g>
  <rect x="608" y="330" width="482" height="336" rx="10" fill="#fffdfa" stroke="#ded8ce"/>
  <text x="632" y="372" fill="#15191d" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800">Receipts</text>
  <g font-family="Inter, Arial, sans-serif" font-size="18">
    <rect x="632" y="410" width="406" height="48" rx="8" fill="#f6f1e8"/>
    <text x="654" y="441" fill="#15191d" font-weight="750">scorecard.md</text>
    <text x="942" y="441" fill="#55745c" font-weight="800">PASS</text>
    <rect x="632" y="476" width="406" height="48" rx="8" fill="#f6f1e8"/>
    <text x="654" y="507" fill="#15191d" font-weight="750">cost-ledger.json</text>
    <text x="928" y="507" fill="#1e5b7a" font-weight="800">$0.00</text>
    <rect x="632" y="542" width="406" height="48" rx="8" fill="#f6f1e8"/>
    <text x="654" y="573" fill="#15191d" font-weight="750">verifier-receipt.json</text>
    <text x="908" y="573" fill="#b85d3f" font-weight="800">LOCKED</text>
    <rect x="632" y="608" width="406" height="48" rx="8" fill="#f6f1e8"/>
    <text x="654" y="639" fill="#15191d" font-weight="750">official-scorer.txt</text>
    <text x="906" y="639" fill="#b68a36" font-weight="800">EXPLICIT</text>
  </g>
</svg>

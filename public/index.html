<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Proof Loop</title>
    <meta
      name="description"
      content="Paste a live URL or GitHub repo and Proof Loop will prepare a verified proof run."
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="landing" data-testid="landing">
      <p class="eyebrow">ProofLoop Live</p>
      <h1>ProofLoop your app or repo</h1>
      <p class="lede">
        Paste a live URL or GitHub repo. We run the proof plan, capture receipts, and show what is
        verified instead of trusting a "done" claim.
      </p>
      <div class="intake" role="search">
        <input
          data-intake-input
          data-testid="target-input"
          type="text"
          inputmode="url"
          autocomplete="url"
          spellcheck="false"
          placeholder="https://your-app.com or https://github.com/org/repo"
          aria-label="URL or GitHub repository"
          autofocus
        />
        <button data-intake-submit data-testid="target-submit" type="button">ProofLoop</button>
      </div>
      <a class="github-sso" data-github-sso data-testid="github-sso" href="/api/auth/github/start">
        Continue with GitHub
      </a>
      <p class="status" data-intake-status hidden></p>
      <pre class="detail" data-intake-detail hidden></pre>
    </main>

    <script src="/app.js" defer></script>
  </body>
</html>

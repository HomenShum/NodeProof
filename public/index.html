<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Proof Loop</title>
    <meta
      name="description"
      content="Put your URL or GitHub in and Proof Loop will prepare the proof run."
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="landing" data-testid="landing">
      <h1>Put your URL or GitHub in</h1>
      <div class="intake" role="search">
        <input
          data-intake-input
          data-testid="target-input"
          type="text"
          inputmode="url"
          autocomplete="url"
          spellcheck="false"
          placeholder="https://your-app.com or https://github.com/org/repo"
          aria-label="URL or GitHub repository"
          autofocus
        />
        <button data-intake-submit data-testid="target-submit" type="button">ProofLoop</button>
      </div>
      <p class="status" data-intake-status hidden></p>
      <pre class="detail" data-intake-detail hidden></pre>
    </main>

    <script src="/app.js" defer></script>
  </body>
</html>
